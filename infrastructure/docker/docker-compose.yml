version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dineflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  pgbouncer:
    image: edoburu/pgbouncer:1.20.1
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dineflow"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "15"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
    ports:
      - '6432:5432'
    depends_on:
      - postgres

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - '4000:4000'
    depends_on:
      - pgbouncer
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgbouncer:5432/dineflow?schema=public&pgbouncer=true
      - REDIS_URL=redis://redis:6379
      - PORT=4000
      - JWT_SECRET=super-secret-jwt-key-change-in-production
      - JWT_REFRESH_SECRET=super-secret-refresh-key-change-in-production
      - CLIENT_URL=http://localhost:3000
      - ADMIN_SECRET_KEY=default-admin-secret-key-change-in-production

volumes:
  postgres_data:
  redis_data:
